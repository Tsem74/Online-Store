<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Online Store</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Product List</h1>
        <a th:href="@{/products/create}" class="btn btn-primary">Add Product</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Image</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}">ID</td>
                    <td th:text="${product.code}">Code</td>
                    <td th:text="${product.name}">Name</td>
                    <td th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">Price</td>
                    <td th:text="${product.quantity}">Qty</td>
                    <td>
                        <img th:if="${product.image}" th:src="@{/images/{image}(image=${product.image})}" alt="Product" style="height: 50px; object-fit: cover;">
                        <span th:unless="${product.image}" class="badge badge-secondary">No Image</span>
                    </td>
                    <td>
                        <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-sm btn-warning">Edit</a>
                        <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this product?')">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
